<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLIPSIDE</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a0a00;
      --surface:     #2c1500;
      --border:      #5c3010;
      --accent:      #f97316;
      --accent-dim:  #7c3800;
      --text:        #f5e6d0;
      --text-muted:  #a07850;
      --font:        'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    #app {
      width: 100%;
      max-width: 480px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #streak {
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    #streak span {
      color: var(--accent);
      font-size: 1rem;
    }

    /* ── Card ── */
    #card {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 28px 24px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    button {
      font-family: var(--font);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 18px;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }

    button:not(:disabled):hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a0a00;
    }

    button:disabled {
      color: var(--accent-dim);
      border-color: var(--accent-dim);
      cursor: default;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a0a00;
    }

    button.primary:hover {
      background: #fb923c;
      border-color: #fb923c;
    }

    button.danger {
      border-color: #dc2626;
      color: #dc2626;
    }

    button.danger:hover {
      background: #dc2626;
      color: var(--text);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-row button { flex: 1; }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      height: 4px;
      background: var(--border);
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }

    .progress-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 5px;
      letter-spacing: 0.05em;
    }

    /* ── Text input ── */
    textarea {
      font-family: var(--font);
      font-size: 0.9rem;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      width: 100%;
      resize: vertical;
      min-height: 72px;
      letter-spacing: 0.03em;
      direction: ltr;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea::placeholder { color: var(--text-muted); }

    /* ── Reveal panel ── */
    .lyric-display {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--text);
      border-left: 3px solid var(--accent);
      padding-left: 14px;
    }

    .attribution {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .your-guess {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .your-guess em {
      color: var(--text);
      font-style: normal;
    }

    /* ── Word hint ── */
    .word-hint {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    /* ── Loading dots ── */
    .dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    /* ── Recording blink ── */
    .rec-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #dc2626;
      animation: blink 1s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .rec-timer {
      font-size: 1.1rem;
      letter-spacing: 0.1em;
    }

    /* ── Play count ── */
    .play-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    @media (max-width: 400px) {
      .btn-row { flex-direction: column; }
      button { width: 100%; }
    }

    #build-time {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-family: var(--font);
      font-size: 0.65rem;
      color: var(--border);
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
    }

    #build-time:hover { color: var(--text-muted); }

    dialog {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      padding: 28px 24px;
      max-width: 320px;
      width: 100%;
    }

    dialog::backdrop { background: rgba(0,0,0,0.7); }

    dialog h2 {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .config-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .config-row label {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    input[type=range] {
      flex: 1;
      accent-color: var(--accent);
    }

    #rate-value {
      font-size: 0.85rem;
      color: var(--accent);
      min-width: 3em;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Flipside</h1>
      <div id="streak" style="display:none">streak <span id="streak-count">0</span></div>
    </header>
    <div id="card"></div>
  </div>
  <div id="build-time"></div>

  <dialog id="config-dialog">
    <h2>Settings</h2>
    <div class="config-row">
      <label>Speech rate</label>
      <input type="range" id="rate-slider" min="20" max="150" step="5" value="85" />
      <span id="rate-value">85%</span>
    </div>
    <div class="btn-row">
      <button id="config-cancel">Cancel</button>
      <button id="config-save" class="primary">Save</button>
    </div>
  </dialog>

  <script type="module" src="src/main.js"></script>
</body>
</html>
